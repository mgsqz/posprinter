name: Build ESC/POS Receiver

on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 指定一个较新的稳定版本

      - name: 编译 Linux 版本
        run: |
          mkdir -p output
          GOOS=linux GOARCH=amd64 go build -o output/escpos_server_linux_amd64 main.go

      - name: 编译 Windows 版本
        run: |
          GOOS=windows GOARCH=amd64 go build -o output/escpos_server_windows_amd64.exe main.go

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: escpos-binaries
          path: output/
