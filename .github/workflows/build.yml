name: Build ESC/POS Receiver
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
 
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
 
      # 新增此步骤：自动下载缺失的依赖包并生成 go.sum
      - name: 下载依赖
        run: go mod tidy
 
      - name: 编译 Linux (amd64) 版本
        run: |
          mkdir -p output
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o output/escpos_server_linux_amd64 .
 
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: escpos-binaries
          path: output/
